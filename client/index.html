          <article>
            <h3>MyMasareef</h3>
            <p><strong>Live Product</strong> | <a href="https://mymasareef.com">mymasareef.com</a></p>
            <p>Free AI-powered spending analysis tool for CIB Egypt bank customers. Upload a bank CSV, get a categorized spending report in seconds. Financial data never leaves the browser.</p>
            <p>How it works: Pattern matching against 90+ known Egyptian merchants. Gemini Flash for unrecognized entries. User override with a crowdsourced merchant dictionary that improves over time. All financial processing stays in the browser.</p>
            <p>Key decisions: Email gate comes after the user sees value, not before. Crowdsourced dictionary reduces cost while improving accuracy. Debit cards got a dedicated experience.</p>
            <p>Tech: React, TypeScript, Tailwind, Supabase, Express, Gemini 2.5 Flash, Claude Code, Recharts, Framer Motion. Built in 4 days.</p>
          </article>

          <article>
            <h3>Call Transcript Analyzer</h3>
            <p><strong>Internal Tool</strong> | <a href="https://github.com/alyelazab/transcript-analyzer">GitHub</a></p>
            <p>Multi-stage AI pipeline that extracts structured product feedback from hundreds of sales call transcripts. Turns buried feature requests and complaints into organized, actionable reports.</p>
            <p>Pipeline: Transcript ingestion from Clari Copilot, multi-pass extraction (features, bugs, complaints, praise), categorization by product area, cross-transcript deduplication, Confluence-ready report generation.</p>
            <p>Key decisions: Used CLAUDE.md as a context engineering layer. Multi-stage processing beat single-pass for accuracy. Chose Confluence output because the team already lived there.</p>
            <p>Tech: Claude Code, Claude API, Confluence. Built in 1 day.</p>
          </article>
